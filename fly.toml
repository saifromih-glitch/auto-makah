app = "auto-makah"
primary_region = "ams"

[build]
  [build.buildpacks]
    builder = "heroku/buildpacks:22"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://auto_makah:auto_makah@db:5432/auto_makah
      - PORT=8000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./data:/app/data

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auto_makah
      POSTGRES_PASSWORD: auto_makah
      POSTGRES_DB: auto_makah
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auto_makah"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
